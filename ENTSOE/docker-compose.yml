version: '3.8'

services:
  db_mongo:
    image: mongo:latest
    container_name: tfg_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27018:27017" 
    volumes:
      - mongo_data_v2:/data/db

volumes:
  mongo_data_v2:
    name: tfg_mongo_data_v2